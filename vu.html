<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

#globeViz{
  width:100%;
  height:100vh;
}

.tooltip{
  position:absolute;
  background:rgba(0,0,0,0.8);
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  pointer-events:none;
  display:none;
}
</style>
</head>

<body>

<div id="globeViz"></div>
<div id="tooltip" class="tooltip"></div>

<script>

const tooltip = document.getElementById("tooltip");

const globe = Globe()
(document.getElementById("globeViz"))

.globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg") // sáng hơn
.bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")

.backgroundColor("#001220")

.labelLat(d => d.lat)
.labelLng(d => d.lng)
.labelText(d => d.name)

.labelSize(1.4)
.labelColor(() => "white")
.labelResolution(2)
.labelDotRadius(0.35)

.onLabelHover(d => {

if(d){
tooltip.style.display="block";
tooltip.innerHTML =
"<b>"+d.name+"</b><br>Country";
}else{
tooltip.style.display="none";
}

});

document.addEventListener("mousemove",e=>{
tooltip.style.left = e.pageX+12+"px";
tooltip.style.top = e.pageY+12+"px";
});

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.6;



fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world_country_centroids.geojson")

.then(res=>res.json())

.then(data=>{

const countries = data.features.map(f=>({
name:f.properties.name,
lat:f.geometry.coordinates[1],
lng:f.geometry.coordinates[0]
}));

globe.labelsData(countries);

});

</script>

</body>
</html>
